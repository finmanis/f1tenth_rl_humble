action:
  max_speed: 8.0
  max_steer: 0.4189
  min_speed: 0.5
  num_speed_bins: 5
  num_steer_bins: 7
  residual_speed_range: 2.0
  residual_steer_range: 0.15
  smoothing_alpha: 1.0
  type: continuous
algorithm:
  custom_ppo:
    anneal_lr: true
    clip_coef: 0.2
    ent_coef: 0.01
    gae_lambda: 0.95
    gamma: 0.99
    learning_rate: 0.0003
    max_grad_norm: 0.5
    normalize_advantages: true
    num_minibatches: 32
    num_steps: 2048
    update_epochs: 10
    vf_coef: 0.5
  ppo:
    batch_size: 128
    clip_range: 0.2
    ent_coef: 0.01
    gae_lambda: 0.95
    gamma: 0.99
    learning_rate: 0.0003
    max_grad_norm: 0.5
    n_epochs: 10
    n_steps: 2048
    use_sde: false
    vf_coef: 0.5
  sac:
    batch_size: 256
    buffer_size: 1000000
    ent_coef: auto
    gamma: 0.99
    learning_rate: 0.0003
    learning_starts: 10000
    tau: 0.005
    train_freq: 1
  td3:
    batch_size: 256
    buffer_size: 1000000
    gamma: 0.99
    learning_rate: 0.001
    learning_starts: 10000
    policy_delay: 2
    tau: 0.005
    train_freq: 1
  total_timesteps: 500000
  type: ppo
callbacks:
  checkpoint_freq: 50000
domain_randomization:
  action_delay:
    enabled: false
    max_steps: 2
  cornering_stiffness:
    enabled: false
    scale_range:
    - 0.8
    - 1.2
  enabled: false
  friction:
    enabled: true
    range:
    - 0.6
    - 1.4
  lidar_dropout:
    enabled: false
    rate: 0.02
  lidar_noise:
    enabled: true
    std: 0.02
  mass:
    enabled: true
    range:
    - 3.0
    - 4.5
env:
  integrator: rk4
  map_ext: .png
  map_path: Spielberg
  max_steps: 3000
  num_agents: 1
  num_envs: 8
  num_laps: 1
  start_pose: null
  timestep: 0.01
evaluation:
  deterministic: true
  eval_freq: 50000
  n_eval_episodes: 10
  num_episodes: 50
  render: false
  save_trajectories: true
experiment:
  device: auto
  name: my_first_policy
  runs_dir: runs
  seed: 42
  wandb: true
  wandb_entity: null
  wandb_project: f1tenth_rl
expert:
  pure_pursuit:
    adaptive_lookahead: true
    lookahead_distance: 1.0
    lookahead_gain: 0.4
    max_lookahead: 2.0
    min_lookahead: 0.5
    target_speed: 5.0
  waypoint_path: null
imitation:
  bc:
    batch_size: 256
    demo_path: demos/expert_demos.npz
    enabled: false
    epochs: 100
    learning_rate: 0.001
    validation_split: 0.1
  bc_model_path: runs/bc_pretrained/bc_model.pt
  init_from_bc: false
lidar:
  fov_deg: 270.0
  range_max: 30.0
  raw_beams: 1080
network:
  cnn1d:
    channels:
    - 32
    - 64
    fc_size: 128
    kernel_sizes:
    - 5
    - 3
    strides:
    - 2
    - 2
  mlp:
    activation: relu
    hidden_sizes:
    - 256
    - 256
  pi_layers:
  - 64
  - 64
  shared_layers: false
  type: mlp
  vf_layers:
  - 64
  - 64
observation:
  frame_stack: 1
  include_prev_action: true
  include_steering: false
  include_velocity: true
  include_yaw_rate: true
  lidar_beams: 108
  lidar_clip: 10.0
  lidar_normalize: true
  num_waypoints: 5
  type: lidar_state
  waypoint_spacing: 0.5
reward:
  collision_penalty: -10.0
  crosstrack_weight: 0.004
  heading_weight: 0.04
  lap_bonus: 10.0
  progress_weight: 10.0
  raceline_path: null
  speed_weight: 0.1
  steering_change_penalty: 0.0
  survival_reward: 0.0
  type: progress
