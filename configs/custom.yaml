# ===================================================================
# Multi-Agent: RL vs Pure Pursuit Opponent
# ===================================================================
#
# Two cars on the track: your RL agent (ego) vs a pure pursuit bot.
# The pure pursuit opponent follows the centerline at a fixed speed.
# Your agent needs to learn two things at once:
#   1. How to drive fast around the track
#   2. How to avoid crashing into the opponent
#
# The lidar naturally "sees" the opponent car as an obstacle — no
# special detection code needed. When the opponent blocks the path,
# the agent must learn to slow down, wait, or find a gap to pass.
#
# This is a good stepping stone before self-play, because the opponent
# is predictable (same speed, same path every time).
#
# Usage:
#   python scripts/train.py --config configs/multi_agent_vs_pp.yaml \
#       --map maps/levine_slam/levine_slam --num-envs 8 --device cuda
# ===================================================================

experiment:
  name: "multi_pp"
  seed: 42
  device: "auto"
  runs_dir: "runs"
  wandb: true
  wandb_project: "f1tenth_rl"

env:
  map_path: "maps/levine_race/levine_race"
  map_ext: ".png"
  num_agents: 2                # Two cars on the track
  timestep: 0.01
  integrator: "rk4"
  num_envs: 4                  # PPO value
  max_steps: 1500              # ~15 second episodes focused on a single overtake attempt
  num_laps: 999                # Prevent lap-based termination; we terminate on overtake
  sac_overrides:
    num_envs: 1                # SAC is single-env by design; prevents buffer corruption

# Multi-map sequential training — uncomment to enable.
# The step counter continues across maps so WandB, checkpoints, and callbacks
# stay globally consistent. A boundary checkpoint is saved after each map.
# multi_map:
#   maps:
#     - "maps/spielberg/Spielberg"
#     - "maps/levine_slam/levine_slam"
#     - "maps/levine_blocked/levine_blocked"
#   timesteps_per_map: 2000000   # omit to split algorithm.total_timesteps evenly

# Random spawn: ego at a random track position, opponent slightly ahead
spawn:
  opponent_offset_min: 1.0    # minimum meters opponent starts ahead of ego
  opponent_offset_max: 2.5   # maximum meters opponent starts ahead of ego
  initial_speed: 2.0          # m/s — both cars start at this velocity

# Tell the framework to use a pure pursuit bot as the opponent
multi_agent:
  opponent: "pure_pursuit"

lidar:
  raw_beams: 1080
  fov_deg: 270.0
  range_max: 30.0

observation:
  type: "lidar_state"
  lidar_beams: 108
  lidar_clip: 10.0
  lidar_normalize: true
  include_velocity: true
  include_yaw_rate: true
  include_prev_action: true
  frame_stack: 1

action:
  type: "continuous"
  max_speed: 4.0               # Faster than the opponent (3 m/s) so we can overtake
  min_speed: 0.5
  max_steer: 0.4189
  smoothing_alpha: 0.3         # PPO value — works well
  sac_overrides:
    smoothing_alpha: 0.6       # less lag so Q-function credit assignment is accurate

reward:
  type: "custom"
  # --- PPO-tuned base values (do not change — these work well for PPO) ---
  collision_penalty: -30.0      # Crashing into the opponent is very costly
  lap_bonus: 0.0                # No lap completion; we end on overtake instead
  survival_reward: 0.01
  steering_change_penalty: 0.5
  wall_proximity_penalty: 0.75
  wall_proximity_threshold: 0.5

  # --- Hybrid Component Weights ---
  w_progress: 1.0               # Move forward along track
  w_cth: 0.5                    # Stay on line and point forward
  w_speed: 0.3                  # Go fast
  w_relative: 2.0               # Be further ahead than the opponent (continuous overtake signal)

  # --- Sub-Component Tuning ---
  progress_weight: 10.0         # Internal multiplier for ProgressReward
  heading_weight: 1.0           # Internal multiplier for CTH
  crosstrack_weight: 0.3        # Internal multiplier for CTH
  speed_weight: 0.3             # Internal multiplier for SpeedReward

  # --- Overtake Terminal Reward ---
  overtake_bonus: 70.0          # Large reward when ego successfully passes the opponent

  # --- SAC overrides (merged at runtime when algo=sac, PPO values untouched) ---
  sac_overrides:
    collision_penalty: -30.0      # less cliff-like for Q-value estimation
    survival_reward: 0.02         # stronger alive signal relative to collision
    wall_proximity_penalty: 1.0   # stronger early wall warning
    wall_proximity_threshold: 0.5 # warn earlier (0.8m vs 0.5m)

algorithm:
  type: "sac"
  total_timesteps: 2_000_000
  ppo:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.001
    vf_coef: 0.5
    max_grad_norm: 0.5
  sac:
    learning_rate: 0.0003
    buffer_size: 100_000      # with num_envs=1: ~0.08GB, fits in RAM
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    learning_starts: 20000    # enough random exploration before Q-learning starts
    train_freq: 1
    gradient_steps: 1
    ent_coef: 0.1             # fixed — prevents entropy collapse on sparse collision signal

network:
  type: "mlp"
  mlp:
    hidden_sizes: [128, 128]
    activation: "relu"
  pi_layers: [64, 64]
  vf_layers: [64, 64]

domain_randomization:
  enabled: true
  mode: "curriculum"
  curriculum_warmup: 0.2
  curriculum_full: 0.6
  friction: { enabled: true, range: [0.7, 1.3] }
  mass: { enabled: true, range: [3.2, 4.2] }
  lidar_noise: { enabled: true, std: 0.04 }

expert:
  pure_pursuit:
    target_speed: 3.5          # Opponent speed — ego should be faster

evaluation:
  eval_freq: 100000
  n_eval_episodes: 10
  deterministic: true

callbacks:
  checkpoint_freq: 100000
